{% extends "base.html" %}
{% block title %}Sign Up — QuickNotes{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon">📚</div>
      <h2>Create your account</h2>
      <p>Join QuickNotes — free study platform</p>
    </div>
    {% if error %}
    <div class="flash error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('signup') }}">
      <div class="field">
        <label>Full name *</label>
        <input type="text" name="name" placeholder="e.g. Rahul Sharma" required/>
      </div>
      <div class="field">
        <label>Email *</label>
        <input type="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="field">
        <label>Password * (min 6 characters)</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <div class="field">
        <label>Confirm password *</label>
        <input type="password" name="confirm" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-solid full-w">Create account</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>
</div>

{% endblock %}
