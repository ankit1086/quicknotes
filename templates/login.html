{% extends "base.html" %}
{% block title %}Login — QuickNotes{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon">👋</div>
      <h2>Welcome back!</h2>
      <p>Login to your QuickNotes account</p>
    </div>
    {% if error %}
    <div class="flash error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label>Email *</label>
        <input type="email" name="email" placeholder="your@email.com" required/>
      </div>
      <div class="field">
        <label>Password *</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-solid full-w">Login</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('signup') }}">Sign up free</a>
    </div>
  </div>
</div>

{% endblock %}
