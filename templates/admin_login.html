{% extends "base.html" %}
{% block title %}Admin Login — QuickNotes{% endblock %}
{% block content %}

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-icon">🔐</div>
      <h2>Admin sign in</h2>
      <p>Only for platform administrators</p>
    </div>
    {% if error %}
    <div class="flash error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="{{ url_for('admin') }}">
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" placeholder="admin@quicknotes.com" required/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn-solid full-w">Sign in</button>
    </form>
    <div class="auth-footer">
      <a href="{{ url_for('home') }}">← Back to website</a>
    </div>
  </div>
</div>

{% endblock %}
