<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}QuickNotes — Free Study Platform{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>

<nav class="nav">
  <a href="{{ url_for('home') }}" class="brand">Quick<span>Notes</span></a>
  <div class="nav-links">
    <a href="{{ url_for('home') }}"   class="nb {% if request.endpoint=='home'   %}active{% endif %}">Home</a>
    <a href="{{ url_for('notes') }}"  class="nb {% if request.endpoint=='notes'  %}active{% endif %}">Notes</a>
    <a href="{{ url_for('videos') }}" class="nb {% if request.endpoint=='videos' %}active{% endif %}">Videos</a>
    <a href="{{ url_for('admin') }}"  class="nb admin-btn">Admin</a>
  </div>
</nav>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
  {% endfor %}
{% endwith %}

{% block content %}{% endblock %}

<footer class="footer">
  <p>QuickNotes &mdash; Free study notes &amp; videos for every student &nbsp;|&nbsp; 100% Free Forever</p>
</footer>

</body>
</html>
